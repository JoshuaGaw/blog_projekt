<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Essen in Köln</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="header">
    <div class="header-content">
        <div class="headername">
            KÖLN ESSENMEILE
        </div>
        <div class="toggle-spacer"></div>
        <button id="new-post-button">Neuer Eintrag</button>
        <div class="entry-toggle-spacer"></div>
        <button id="theme-toggle" class="darkmode-toggle">Toggle Mode</button>
    </div>
</header>


<div id="new-post-container" class="display-none pop-up">
    <div class="form-container pop-up-card squircle-corners">
        <input type="text" id="new-post-title" placeholder="Titel">
        <textarea id="new-post-content" placeholder="Inhalt"></textarea>
        <button id="new-post-submit">Speichern</button>
    </div>
</div>


<main class="main-content">
    <div class="header-content-spacer"></div>
    <div id="hero-container"></div>
    <div class="top-spacer"></div>
    <div id="posts-container"></div>
</main>


</body>
<script src="script.js"></script>
</html>
