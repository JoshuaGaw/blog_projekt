<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Essen in Köln</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- Header -->
<header class="header">
    <div class="header-content">
        <div id="headername" class="headername">
            KÖLN ESSENMEILE
        </div>
        <div class="toggle-spacer"></div>
        <button id="new-post-button">Neuer Eintrag</button>
        <div class="entry-toggle-spacer"></div>
        <button id="theme-toggle" class="darkmode-toggle">Toggle Mode</button>
    </div>
</header>

<!-- Pop-Up -->
<div id="new-post-container" class="display-none pop-up">
    <div class="pop-up-card">
        <div class="new-post-header">
            <div class="new-post-header-title">Neuer Post</div>
        </div>
        <div class="pop-up-content">
            <div class="display-flex-column padding-10">
                <label class="label" for="new-post-title">Titel</label>
                <input class="input-field height-30" type="text" id="new-post-title">
            </div>
            <div class="display-flex-column padding-10">
                <label class="label" for="new-post-description">Beschreibung</label>
                <textarea class="input-field height-80" id="new-post-description" maxlength="200"></textarea>
            </div>
            <div class="display-flex-column padding-10">
                <label class="label" for="new-post-content">Inhalt</label>
                <textarea class="input-field height-200" id="new-post-content"></textarea>
            </div>
        </div>
        <div class="pop-up-footer">
            <button id="new-post-cancel" class="button">Abbrechen</button>
            <button id="new-post-submit" class="button">Speichern</button>
        </div>
    </div>
</div>

<!-- Karten -->
<main class="main-content">
    <div class="header-content-spacer"></div>
    <div id="hero-container"></div>
    <div class="top-spacer"></div>
    <div id="posts-container"></div>
</main>


</body>
<script src="script.js"></script>
</html>
